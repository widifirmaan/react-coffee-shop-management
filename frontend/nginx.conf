server {
    listen 80;
    client_max_body_size 50M;
    
    # Use Docker's internal DNS
    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api/(.*)$ {
        # Using a variable forces re-resolution and prevents startup crash
        set $api_upstream http://backend:8080/api/$1$is_args$args;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    location ~ ^/uploads/(.*)$ {
        set $uploads_upstream http://backend:8080/uploads/$1;
        proxy_pass $uploads_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
