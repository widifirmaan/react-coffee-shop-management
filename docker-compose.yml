version: '3.8'

services:
  backend:
    build: ./backend
    container_name: americano-backend
    restart: always
    ports:
      - "8180:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/coffeeshop
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:8085,http://localhost:8180,https://nyafe.widifirmaan.web.id,http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: americano-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  uploads_data:


networks:
  default:
    name: coffeeshop_network
