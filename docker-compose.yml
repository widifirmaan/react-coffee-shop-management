version: '3.8'

services:
  # mongo service uses existing 'americano-mongo' container on 'root_default' network

  backend:
    build: ./backend
    container_name: americano-backend
    restart: always
    ports:
      - "8180:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://americano-mongo:27017/coffeeshop
      - SERVER_PORT=8080

  frontend:
    build: ./frontend
    container_name: americano-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - backend

networks:
  default:
    external: true
    name: root_default
