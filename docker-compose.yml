version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: americano-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: americano-backend
    restart: always
    ports:
      - "8180:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongo:27017/coffeeshop
      - SERVER_PORT=8080
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: americano-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - backend

volumes:
  mongo-data:
