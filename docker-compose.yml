version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: americano-mongo-internal
    restart: always
    ports:
      - "27019:27017" # Map to different host port (27019) to avoid conflict with existing mongo
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: americano-backend
    restart: always
    ports:
      - "8180:8080"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/coffeeshop
      - PORT=8080
      - ALLOWED_ORIGINS=http://localhost:8085,http://localhost:8180,https://nyafe.widifirmaan.web.id,http://localhost:3000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: americano-frontend
    restart: always
    ports:
      - "8085:80"
    depends_on:
      - backend

volumes:
  mongo_data:


networks:
  default:
    name: coffeeshop_network
